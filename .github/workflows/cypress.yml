name: Execute os testes Cypress

on:
  push:
    branches:
      - main

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Confere o repositório
        uses: actions/checkout@v4

      - name: Configurar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependências
        run: npm install

      - name: Instalar http-server
        run: npm install -g http-server

      - name: Inicie o servidor
        run: http-server . -p 3000 &

      - name: Executar Cypress
        run: npx cypress run
